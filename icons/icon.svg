<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#192734"/>
      <stop offset="100%" stop-color="#15202B"/>
    </linearGradient>
    <mask id="crescent">
      <rect width="512" height="512" fill="white"/>
      <circle cx="290" cy="180" r="100" fill="black"/>
    </mask>
  </defs>

  <!-- Background rounded rectangle -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Crescent moon -->
  <circle cx="240" cy="220" r="120" fill="#1D9BF0" mask="url(#crescent)"/>

  <!-- Stars -->
  <circle cx="340" cy="140" r="5" fill="white" opacity="0.8"/>
  <circle cx="380" cy="200" r="3.5" fill="white" opacity="0.6"/>
  <circle cx="360" cy="100" r="2.5" fill="white" opacity="0.4"/>
  <circle cx="310" cy="120" r="4" fill="white" opacity="0.7"/>

  <!-- DIM text -->
  <text x="256" y="420" text-anchor="middle" fill="white" opacity="0.7"
        font-family="Arial, Helvetica, sans-serif" font-size="50" font-weight="bold"
        letter-spacing="12">DIM</text>
</svg>
